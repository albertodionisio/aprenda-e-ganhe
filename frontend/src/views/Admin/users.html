<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuários — Admin</title>
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2>👥 Usuários</h2>
        <a href="dashboard.html" style="text-decoration:none; font-size:22px;">🏠</a>
    </div>

    <div class="card">
        <input type="text" id="searchInput" placeholder="Buscar por nome, e-mail ou username" oninput="loadUsers()">
    </div>

    <div id="usersList"><p class="text-muted">Carregando...</p></div>
</div>

<script src="../../services/api.js"></script>
<script>
requireAuth();
let searchTimeout;

function loadUsers() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(fetchUsers, 300);
}

async function fetchUsers() {
    const search = document.getElementById('searchInput').value;
    const endpoint = search ? `/admin/users?search=${encodeURIComponent(search)}` : '/admin/users';
    try {
        const data = await apiRequest(endpoint);
        const container = document.getElementById('usersList');
        if (data.users.length === 0) {
            container.innerHTML = '<p class="text-muted">Nenhum usuário encontrado.</p>';
            return;
        }
        container.innerHTML = data.users.map(u => `
            <div class="card">
                <p><b>${u.name}</b> (@${u.username})</p>
                <p class="text-muted">${u.email}</p>
                <span class="badge">${u.account_status}</span>
                ${u.is_premium ? '<span class="badge premium">⭐ Premium</span>' : ''}
                <div style="margin-top:10px;">
                    <select onchange="updateStatus(${u.id}, this.value)">
                        <option value="">Alterar estado...</option>
                        <option value="active">Ativo</option>
                        <option value="limited">Limitado</option>
                        <option value="blocked">Bloqueado</option>
                    </select>
                </div>
            </div>
        `).join('');
    } catch (err) {
        console.error(err);
    }
}

async function updateStatus(userId, status) {
    if (!status) return;
    try {
        await apiRequest(`/admin/users/${userId}/status`, 'PUT', { status });
        fetchUsers();
    } catch (err) {
        alert('Erro: ' + err.message);
    }
}

fetchUsers();
</script>
</body>
</html>
