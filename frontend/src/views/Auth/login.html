<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Aprenda e Ganhe</title>
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<div class="container center-screen" style="flex-direction:column;">
    <div class="card" style="width:100%;">
        <h2 class="text-center">📚 Aprenda e Ganhe</h2>
        <div id="errorBox" class="error-box"></div>

        <form id="loginForm">
            <label>E-mail</label>
            <input type="email" id="email" required>

            <label>Senha</label>
            <input type="password" id="password" required>

            <button type="submit" class="btn" id="submitBtn">Entrar</button>
        </form>

        <p class="text-center text-muted" style="margin-top:14px;">
            Não tem conta? <a href="register.html">Criar conta</a>
        </p>
        <p class="text-center text-muted">
            <a href="../Public/index.html">← Voltar à página inicial</a>
        </p>
    </div>
</div>

<script src="../../services/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Entrando...';

    try {
        const data = await apiRequest('/auth/login', 'POST', {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        }, false);

        setToken(data.token);
        setUser(data.user);
        window.location.href = '../Dashboard/index.html';
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar';
    }
});
</script>
</body>
</html>
