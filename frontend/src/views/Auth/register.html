<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Aprenda e Ganhe</title>
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
<div class="container">
    <div class="card" style="margin-top:30px;">
        <h2 class="text-center">Criar Conta</h2>
        <div id="errorBox" class="error-box"></div>

        <form id="registerForm">
            <label>Nome completo</label>
            <input type="text" id="name" required>

            <label>Nome de usuário</label>
            <input type="text" id="username" required>

            <label>E-mail</label>
            <input type="email" id="email" required>

            <label>Telefone</label>
            <input type="tel" id="phone" placeholder="+258...">

            <label>Senha</label>
            <input type="password" id="password" required minlength="6">

            <label>Código de indicação (opcional)</label>
            <input type="text" id="referralCode" placeholder="Ex: JOAO1234">

            <button type="submit" class="btn" id="submitBtn">Criar Conta</button>
        </form>

        <p class="text-center text-muted" style="margin-top:14px;">
            Já tem conta? <a href="login.html">Entrar</a>
        </p>
    </div>
</div>

<script src="../../services/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Criando conta...';

    try {
        const data = await apiRequest('/auth/register', 'POST', {
            name: document.getElementById('name').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            country: 'Moçambique',
            password: document.getElementById('password').value,
            referralCode: document.getElementById('referralCode').value
        }, false);

        setToken(data.token);
        setUser(data.user);
        window.location.href = '../Dashboard/index.html';
    } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Criar Conta';
    }
});
</script>
</body>
</html>
