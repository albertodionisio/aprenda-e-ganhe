<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Aprenda e Ganhe</title>
<link rel="stylesheet" href="../../assets/style.css">
<script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
<script type="text/javascript">
    aclib.runAutoTag({
        zoneId: 'ht762qqnyg',
    });
</script>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h2>🎯 Quiz</h2>
        <a href="../Dashboard/index.html" style="text-decoration:none; font-size:22px;">✖️</a>
    </div>

    <div style="margin-bottom:14px;">
        <select id="categorySelect" onchange="onCategoryChange()">
            <option value="">Todas as categorias</option>
        </select>
    </div>

    <div id="potentialCard" class="card" style="display:none; margin-bottom:14px;">
        <p class="text-muted" style="margin:0;">Nesta categoria podes ganhar até:</p>
        <p style="font-size:20px; font-weight:bold; margin:4px 0;">
            <span id="potentialReward"></span> &nbsp;•&nbsp; <span id="potentialXp"></span> XP
        </p>
        <p class="text-muted" id="potentialCount" style="margin:0;"></p>
    </div>

    <div id="loadingBox" class="card text-center"><p class="text-muted">Carregando pergunta...</p></div>

    <div id="quizCard" class="card" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="badge" id="categoryBadge"></span>
            <span id="timerText" style="font-weight:bold; font-size:18px;">30s</span>
        </div>
        <div style="background:#eee; border-radius:6px; height:6px; margin-top:8px; overflow:hidden;">
            <div id="timerFill" style="height:100%; width:100%; background:#2ecc71; transition:width 1s linear;"></div>
        </div>
        <h3 id="questionText" style="margin-top:14px;"></h3>
        <div id="optionsContainer"></div>
        <p class="text-muted" id="rewardInfo" style="margin-top:8px;"></p>
    </div>

    <div id="resultCard" class="card" style="display:none;">
        <h3 id="resultTitle"></h3>
        <p id="resultExplanation" class="text-muted"></p>
        <div id="resultRewards" style="margin: 12px 0;"></div>
        <button class="btn" id="nextBtn" onclick="loadNextQuestion()">Próxima Pergunta ▶️</button>
    </div>

    <div id="sessionCard" class="card" style="display:none;">
        <h3>🏁 Série de 10 perguntas concluída!</h3>
        <p style="font-size:22px; font-weight:bold; margin:8px 0;" id="sessionEarned"></p>
        <p class="text-muted" id="sessionScore"></p>

        <button class="btn" id="adBoostBtn" onclick="requestAdBoost()" style="margin-top:12px;">📺 Ver anúncio e ganhar +3</button>
        <p class="text-muted" id="adBoostResult" style="margin-top:8px;"></p>

        <h4 style="margin-top:20px;">Revisão das respostas</h4>
        <div id="sessionReview"></div>

        <button class="btn outline" style="margin-top:14px;" onclick="loadNextQuestion()">Continuar respondendo ▶️</button>
    </div>

    <div id="emptyCard" class="card text-center" style="display:none;">
        <p>🎉 Sem novas perguntas por agora nesta categoria.</p>
        <a href="../Dashboard/index.html" class="btn outline">Voltar ao Início</a>
    </div>
</div>

<script src="../../services/api.js"></script>
<script>
requireAuth();

const QUESTION_TIME = 30;

let currentQuestion = null;
let answered = false;
let categoriesData = [];
let pendingSession = null;
let timerInterval = null;
let timeLeft = QUESTION_TIME;

async function loadCategories() {
    try {
        const data = await apiRequest('/quiz/categories');
        categoriesData = data.categories;
        const select = document.getElementById('categorySelect');
        categoriesData.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.slug;
            opt.textContent = `${c.name} (${c.remaining_questions} disponíveis)`;
            select.appendChild(opt);
        });
    } catch (err) {
        console.error(err);
    }
}

function updatePotentialCard() {
    const slug = document.getElementById('categorySelect').value;
    const potentialCard = document.getElementById('potentialCard');

    if (!slug) {
        potentialCard.style.display = 'none';
        return;
    }
    const cat = categoriesData.find(c => c.slug === slug);
    if (!cat || cat.remaining_questions === 0) {
        potentialCard.style.display = 'none';
        return;
    }
    document.getElementById('potentialReward').textContent = `+${parseFloat(cat.potential_reward).toFixed(2)}`;
    document.getElementById('potentialXp').textContent = `+${cat.potential_xp}`;
    document.getElementById('potentialCount').textContent = `${cat.remaining_questions} pergunta(s) por responder`;
    potentialCard.style.display = 'block';
}

function onCategoryChange() {
    updatePotentialCard();
    loadNextQuestion();
}

function show(id) {
    ['loadingBox', 'quizCard', 'resultCard', 'sessionCard', 'emptyCard'].forEach(cid => {
        document.getElementById(cid).style.display = (cid === id) ? 'block' : 'none';
    });
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function startTimer() {
    stopTimer();
    timeLeft = QUESTION_TIME;
    document.getElementById('timerText').textContent = `${timeLeft}s`;
    document.getElementById('timerFill').style.width = '100%';
    document.getElementById('timerFill').style.background = '#2ecc71';

    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timerText').textContent = `${timeLeft}s`;
        const pct = Math.max(0, (timeLeft / QUESTION_TIME) * 100);
        document.getElementById('timerFill').style.width = `${pct}%`;
        if (timeLeft <= 10) {
            document.getElementById('timerFill').style.background = '#e74c3c';
        }
        if (timeLeft <= 0) {
            stopTimer();
            onTimeExpired();
        }
    }, 1000);
}

function onTimeExpired() {
    if (answered) return;
    answered = true;
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    document.getElementById('questionText').insertAdjacentHTML(
        'afterend',
        '<p class="text-muted" id="timeoutMsg">⏰ Tempo esgotado! A avançar para a próxima pergunta...</p>'
    );
    setTimeout(() => loadNextQuestion(), 1800);
}

async function loadNextQuestion() {
    answered = false;
    pendingSession = null;
    stopTimer();
    show('loadingBox');
    const categorySlug = document.getElementById('categorySelect').value;
    const endpoint = categorySlug ? `/quiz/next?categorySlug=${categorySlug}` : '/quiz/next';

    try {
        const data = await apiRequest(endpoint);
        currentQuestion = data.quiz;

        document.getElementById('categoryBadge').textContent = currentQuestion.category_name;
        document.getElementById('questionText').textContent = currentQuestion.question_text;
        document.getElementById('rewardInfo').textContent =
            `Recompensa: +${currentQuestion.xp_amount} XP se acertar, +${currentQuestion.reward_amount} na moeda local`;

        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';

        const options = [
            ['A', currentQuestion.option_a],
            ['B', currentQuestion.option_b],
            ['C', currentQuestion.option_c],
            ['D', currentQuestion.option_d],
        ].filter(([key, text]) => text);

        options.forEach(([key, text]) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.id = `option-${key}`;
            btn.textContent = `${key}) ${text}`;
            btn.onclick = () => submitAnswer(key);
            container.appendChild(btn);
        });

        show('quizCard');
        startTimer();
    } catch (err) {
        if (err.message && err.message.toLowerCase().includes('sem novas')) {
            show('emptyCard');
        } else {
            show('emptyCard');
            document.querySelector('#emptyCard p').textContent = 'Erro ao carregar pergunta: ' + err.message;
        }
    }
}

async function submitAnswer(selectedOption) {
    if (answered) return;
    answered = true;
    stopTimer();

    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    try {
        const data = await apiRequest('/quiz/submit', 'POST', {
            questionId: currentQuestion.id,
            selectedOption
        });

        document.getElementById(`option-${selectedOption}`).classList.add(data.correct ? 'correct' : 'wrong');
        if (!data.correct) {
            document.getElementById(`option-${data.correctOption}`).classList.add('correct');
        }

        document.getElementById('resultTitle').textContent = data.correct
            ? '✅ Resposta correta!'
            : '❌ Resposta incorreta';
        document.getElementById('resultExplanation').textContent = data.explanation || '';

        let rewardsHtml = `<p>+${data.xpEarned} XP`;
        if (data.rewardPaid > 0) rewardsHtml += ` &nbsp;•&nbsp; +${data.rewardPaid} ${data.currency}`;
        rewardsHtml += '</p>';
        if (data.progress.leveledUp) rewardsHtml += `<p class="text-success">🎉 Subiu para o nível ${data.progress.level}!</p>`;
        (data.unlockedAchievements || []).forEach(a => {
            rewardsHtml += `<p>${a.icon} Conquista desbloqueada: <b>${a.title}</b></p>`;
        });
        (data.completedMissions || []).forEach(m => {
            rewardsHtml += `<p>🎯 Missão concluída: <b>${m.title}</b> (+${m.xp_reward} XP)</p>`;
        });
        document.getElementById('resultRewards').innerHTML = rewardsHtml;

        if (data.sessionComplete && data.session) {
            pendingSession = data.session;
        }

        setTimeout(() => {
            if (pendingSession) {
                showSessionSummary(pendingSession);
            } else {
                show('resultCard');
            }
        }, 600);
    } catch (err) {
        alert('Erro ao enviar resposta: ' + err.message);
        answered = false;
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
        startTimer();
    }
}

function showSessionSummary(session) {
    document.getElementById('sessionEarned').textContent =
        `Ganhaste ${session.totalEarned.toFixed(2)} de ${session.maxPossible.toFixed(2)} ${session.currency}`;
    document.getElementById('sessionScore').textContent =
        `Acertaste ${session.correctCount} de ${session.totalQuestions} perguntas`;

    document.getElementById('adBoostBtn').style.display = 'inline-block';
    document.getElementById('adBoostResult').textContent = '';

    const reviewContainer = document.getElementById('sessionReview');
    reviewContainer.innerHTML = session.review.map((r, i) => `
        <div class="card" style="margin-bottom:8px; ${r.isCorrect ? 'border-left:4px solid #2ecc71;' : 'border-left:4px solid #e74c3c;'}">
            <p style="margin:0; font-weight:bold;">${i + 1}. ${r.questionText}</p>
            <p style="margin:4px 0 0;" class="text-muted">
                A tua resposta: ${r.selectedOption} ${r.isCorrect ? '✅' : `❌ (Correta: ${r.correctOption})`}
            </p>
            <p style="margin:4px 0 0;" class="text-muted">${r.explanation || ''}</p>
        </div>
    `).join('');

    show('sessionCard');
}

async function requestAdBoost() {
    const btn = document.getElementById('adBoostBtn');
    const resultEl = document.getElementById('adBoostResult');
    btn.disabled = true;
    btn.textContent = 'A carregar anúncio...';

    try {
        const data = await apiRequest('/quiz/ad-boost', 'POST');
        resultEl.textContent = `🎉 +${data.bonus} ${data.currency} adicionados à tua carteira!`;
        btn.style.display = 'none';
    } catch (err) {
        resultEl.textContent = err.message;
        btn.disabled = false;
        btn.textContent = '📺 Ver anúncio e ganhar +3';
    }
}

async function init() {
    await loadCategories();
    updatePotentialCard();
    loadNextQuestion();
}

init();
</script>
</body>
            </html>
